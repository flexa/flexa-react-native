buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['FlexaReactNative_' + name]
  }
  repositories {
      google()
      mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["FlexaReactNative_" + name]).toInteger()
}

android {
  compileSdkVersion getExtOrIntegerDefault('compileSdkVersion')
  namespace "com.flexa.reactnative"

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable 'GradleCompatible'
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
  packagingOptions {
    pickFirst 'META-INF/versions/9/OSGI-INF/MANIFEST.MF'
  }
}

sourceSets {
  main {
    java.srcDirs += [
      "generated/java",
      "generated/jni"
    ]
  }
}

repositories {
  mavenCentral()
  google()
  mavenLocal()
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "co.flexa:spend:1.1.2"
  implementation platform("androidx.compose:compose-bom:2024.02.00")
  implementation "androidx.compose.ui:ui"
  // From node_modules
  testImplementation 'junit:junit:4.13.2'
  testImplementation "org.robolectric:robolectric:4.11.1"
}
